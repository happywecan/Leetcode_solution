name: Test Python Solutions

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a14c070363b42c8ef1b67631cfb10c21601a9b2e # v6.2.0
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v
